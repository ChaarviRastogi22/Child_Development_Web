<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Early Childhood Development - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Link CSS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">
    
    <div class="left-panel">
        <img class="leftPanelImage" src="leftPanelImg.png"> 
    </div>

    <div class="right-panel">
        
        <h1>Growing Together</h1>
        <p class="sub-text">
            From newborn to 5 years — every step matters.
        </p>
        <p>
            Track your child's milestones, understand their development,
            and support their growth with evidence-based insights.
        </p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="login-btn">Login</button>

        </form>

        <div class="extra-links">
            <p><a href="#">Forgot Password?</a></p>
            <p>New parent? <a href="../register/register.html">Create Account</a></p>
            <p><a href="../admin/adminHomePage.html">Login as Admin</a></p>
        </div>

        <script src="login.js"></script>
    </div>

</div>

</body>
</html>
